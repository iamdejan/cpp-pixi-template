name: PR Pipeline
on:
  pull_request:
    branches:
      - main

jobs:
  pipeline:
    strategy:
      matrix:
        os: ['ubuntu-slim']
        cpp_version: ['17', '20', '23']
        sanitize_mode: ['address', 'thread']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.65.0
          cache: true
      - name: Run linter check
        run: pixi run lint-ci
      - name: Build
        run: pixi run build ${{ matrix.sanitize_mode }} ${{ matrix.cpp_version }}
